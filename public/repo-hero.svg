    </text>

    <g transform="translate(0 118)">
      <rect width="360" height="74" rx="24" fill="#ffffff" stroke="#dbe8f7" stroke-width="3" />
      <path d="M32 37h112" stroke="#2F7CF6" stroke-width="12" stroke-linecap="round" />
      <path d="M170 37h32" stroke="#00B894" stroke-width="12" stroke-linecap="round" />
      <path d="M232 37h94" stroke="#dbe8f7" stroke-width="12" stroke-linecap="round" />
      <circle cx="330" cy="37" r="12" fill="#00B894" />
    </g>

    <g transform="translate(0 228)">
      <rect width="404" height="180" rx="28" fill="#1f2b3d" />
      <path d="M48 108c24-70 42-70 66 0s42 70 66 0s42-70 66 0s42 70 66 0" fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="18" />
      <text x="48" y="56" fill="#eef4ff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700">

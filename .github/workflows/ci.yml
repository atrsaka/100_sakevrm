name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Build Pages artifact
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_EXPORT: "true"
        run: npm run build:pages

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        shell: bash
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3100 > /tmp/gemini-vrm-dev.log 2>&1 &
          DEV_SERVER_PID=$!
          trap 'kill $DEV_SERVER_PID' EXIT

          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3100 > /dev/null; then
              break
            fi

            sleep 2
          done

          npm run e2e:smoke

      - name: Upload dev server log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gemini-vrm-dev-log
          path: /tmp/gemini-vrm-dev.log

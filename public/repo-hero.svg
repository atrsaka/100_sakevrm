<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">GeminiVRM repository hero</title>
  <desc id="desc">A stylized browser panel showing a VRM avatar speaking with Gemini Live audio.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9f5eb" />
      <stop offset="50%" stop-color="#f5ead6" />
      <stop offset="100%" stop-color="#e7f5ef" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f2f7ff" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F7CF6" />
      <stop offset="100%" stop-color="#00B894" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#2A2E431A" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <circle cx="150" cy="120" r="72" fill="#ffffff88" />
  <circle cx="1160" cy="580" r="124" fill="#ffffff66" />
  <path d="M0 620C180 540 330 520 500 580C655 636 850 642 1280 500V720H0Z" fill="#ffffff55" />

  <g filter="url(#shadow)">
    <rect x="136" y="84" width="1008" height="552" rx="36" fill="url(#panel)" />
    <rect x="136" y="84" width="1008" height="72" rx="36" fill="#f4efe5" />
    <circle cx="188" cy="120" r="10" fill="#ff8b74" />
    <circle cx="220" cy="120" r="10" fill="#ffcb57" />
    <circle cx="252" cy="120" r="10" fill="#5ed08f" />
  </g>

  <g transform="translate(220 188)">
    <rect width="392" height="344" rx="28" fill="#f7fbff" stroke="#dce7f7" stroke-width="4" />
    <rect x="36" y="36" width="320" height="36" rx="18" fill="#e9f1fc" />
    <rect x="36" y="92" width="212" height="24" rx="12" fill="#e9f1fc" />
    <circle cx="196" cy="214" r="104" fill="url(#accent)" />
    <path d="M132 182c0-27 22-49 49-49h30c27 0 49 22 49 49v62c0 27-22 49-49 49h-9l-36 32v-32h-15c-27 0-49-22-49-49z" fill="#fff" fill-opacity="0.97" />
    <circle cx="187" cy="205" r="9" fill="#2F7CF6" />
    <circle cx="225" cy="205" r="9" fill="#2F7CF6" />
    <path d="M186 239c9 12 21 18 33 18s24-6 33-18" fill="none" stroke="#2F7CF6" stroke-linecap="round" stroke-width="7" />
  </g>

  <g transform="translate(670 174)">
    <text x="0" y="0" fill="#1f2b3d" font-family="Montserrat, Arial, sans-serif" font-size="68" font-weight="700">
      GeminiVRM
    </text>
    <text x="0" y="58" fill="#475569" font-family="M PLUS 2, Arial, sans-serif" font-size="28">
